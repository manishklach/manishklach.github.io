<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Redirecting | MANISH AI</title>
<meta name="robots" content="noindex, follow"/>
<script>
  (function () {
    var path = (window.location.pathname || "").replace(/\/+$/, "").toLowerCase();
    var redirects = {
      "/writings": "/writings/",
      "/patents": "/patents/",
      "/writings.html": "/writings.html",
      "/patents.html": "/patents.html"
    };
    if (redirects[path] && redirects[path] !== window.location.pathname) {
      window.location.replace(redirects[path]);
      return;
    }
    if (path === "/writings" || path === "/patents") {
      window.location.replace(redirects[path]);
      return;
    }
  })();
</script>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    font: 16px/1.6 system-ui, sans-serif;
    background: #f5f7fb;
    color: #111827;
    padding: 2rem;
  }
  main { max-width: 40rem; text-align: center; }
</style>
</head>
<body>
<main>
  <h1>Page not found</h1>
  <p>If you were looking for the site sections, try <a href="/writings/">Writings</a> or <a href="/patents/">Patents</a>.</p>
</main>
</body>
</html>
