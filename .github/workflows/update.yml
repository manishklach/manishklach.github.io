name: Update Search, Feeds, and Distribution

on:
  push:
    branches:
      - main
    paths-ignore:
      - "pagefind/**"
      - "feed.xml"
      - "feed.json"
      - "og/**"

permissions:
  contents: write

jobs:
  update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Pagefind index
        run: npx pagefind --site .

      - name: Generate feeds and social assets
        run: |
          node scripts/generate-feed.mjs
          node scripts/ensure-og.mjs

      - name: Commit generated artifacts
        run: |
          if [[ -n "$(git status --porcelain pagefind feed.xml feed.json og)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add pagefind feed.xml feed.json og
            git commit -m "Update search feeds and social assets [skip ci]"
            git push
          fi

  crosspost:
    if: github.actor != 'github-actions[bot]'
    needs: update
    runs-on: ubuntu-latest
    env:
      DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cross-post changed essays
        shell: bash
        run: |
          if [[ -z "$DEVTO_API_KEY" ]]; then
            echo "DEVTO_API_KEY not set; skipping cross-post."
            exit 0
          fi
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"
          if [[ "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
            FILES=$(git diff --name-only HEAD~1 HEAD -- 'writings/*.html')
          else
            FILES=$(git diff --name-only "$BEFORE" "$AFTER" -- 'writings/*.html')
          fi
          if [[ -z "$FILES" ]]; then
            echo "No changed writings."
            exit 0
          fi
          node scripts/crosspost-devto.mjs $FILES
